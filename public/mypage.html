<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>マイページ - Urban Shift Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #ffffff;
      color: #0f1419;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 400px;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #1d9bf0;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .back-btn:hover {
      opacity: 0.7;
    }

    .profile-card {
      background: #ffffff;
      border: 1px solid #eff3f4;
      border-radius: 16px;
      padding: 32px 24px;
    }

    .profile-title {
      text-align: center;
      color: #0f1419;
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid #eff3f4;
    }

    .info-item {
      display: flex;
      justify-content: space-between;
      padding: 14px 0;
      border-bottom: 1px solid #eff3f4;
    }

    .info-item:last-child {
      border-bottom: none;
    }

    .info-label {
      color: #536471;
      font-weight: 600;
      font-size: 14px;
    }

    .info-value {
      color: #0f1419;
      font-weight: 700;
      font-size: 14px;
    }

    ::selection {
      background: rgba(29, 155, 240, 0.15);
    }
  </style>
</head>

<body>
  <div class="container">
    <a href="javascript:history.back()" class="back-btn">← 戻る</a>
    <div class="profile-card">
      <h2 class="profile-title">👤 マイページ</h2>
      <div class="info-item">
        <span class="info-label">名前</span>
        <span class="info-value" id="profile-name">-</span>
      </div>
      <div class="info-item">
        <span class="info-label">ユーザーID</span>
        <span class="info-value" id="profile-username">-</span>
      </div>
      <div class="info-item">
        <span class="info-label">ロール</span>
        <span class="info-value" id="profile-role">-</span>
      </div>
    </div>
  </div>

  <script src="/js/mypage.js"></script>
</body>

</html>
