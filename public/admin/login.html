<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン - Urban Shift Studio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #ffffff;
            color: #0f1419;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo {
            font-size: 28px;
            font-weight: 900;
            color: #0f1419;
            margin-bottom: 4px;
        }

        .tagline {
            color: #536471;
            font-size: 14px;
            font-weight: 500;
        }

        .login-box {
            border: 1px solid #eff3f4;
            border-radius: 16px;
            padding: 32px;
        }

        .login-title {
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 24px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            margin-bottom: 6px;
            color: #536471;
            font-weight: 600;
            font-size: 13px;
        }

        .form-control {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #cfd9de;
            border-radius: 8px;
            color: #0f1419;
            font-size: 15px;
            transition: all 0.2s;
            font-family: inherit;
            background: #ffffff;
        }

        .form-control:focus {
            outline: none;
            border-color: #1d9bf0;
            box-shadow: 0 0 0 3px rgba(29, 155, 240, 0.1);
        }

        .form-control::placeholder {
            color: #8899a6;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: #1d9bf0;
            border: none;
            border-radius: 9999px;
            color: white;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
            font-family: inherit;
        }

        .btn-login:hover {
            background: #1a8cd8;
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
        }

        .alert-error {
            background: rgba(244, 33, 46, 0.08);
            color: #f4212e;
            border: 1px solid rgba(244, 33, 46, 0.15);
        }

        .demo-accounts {
            margin-top: 24px;
            padding: 16px;
            background: #f7f9fa;
            border-radius: 12px;
        }

        .demo-title {
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #536471;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .demo-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #eff3f4;
            font-size: 13px;
        }

        .demo-item:last-child {
            border-bottom: none;
        }

        .demo-label {
            color: #536471;
        }

        .demo-value {
            font-family: 'Courier New', monospace;
            color: #1d9bf0;
            font-weight: 600;
        }

        .loading {
            display: none;
            text-align: center;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 3px solid #eff3f4;
            border-top: 3px solid #1d9bf0;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            animation: spin 1s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        ::selection {
            background: rgba(29, 155, 240, 0.15);
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="logo-section">
            <div class="logo">Urban Shift Studio</div>
            <div class="tagline">スマートなシフト管理システム</div>
        </div>

        <div class="login-box">
            <h2 class="login-title">ログイン</h2>
            <div id="alert-container"></div>
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p style="color: #536471;">ログイン中...</p>
            </div>
            <form id="login-form">
                <div class="form-group">
                    <label class="form-label">ユーザー名</label>
                    <input type="text" class="form-control" name="username" required autofocus placeholder="ユーザー名を入力">
                </div>
                <div class="form-group">
                    <label class="form-label">パスワード</label>
                    <input type="password" class="form-control" name="password" required placeholder="パスワードを入力">
                </div>
                <button type="submit" class="btn-login">ログイン</button>
            </form>
            <div class="demo-accounts">
                <div class="demo-title">デモアカウント</div>
                <div class="demo-item">
                    <span class="demo-label">管理者</span>
                    <span class="demo-value">admin / admin123</span>
                </div>
                <div class="demo-item">
                    <span class="demo-label">スタッフ</span>
                    <span class="demo-value">staff1 / staff123</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const credentials = Object.fromEntries(formData);
            document.getElementById('loading').classList.add('active');
            e.target.style.display = 'none';
            try {
                const response = await fetch('/api/login', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    credentials: 'include', body: JSON.stringify(credentials)
                });
                const data = await response.json();
                if (response.ok) {
                    window.location.href = data.user.role === 'admin' ? '/admin' : '/staff';
                } else {
                    showAlert(data.error || 'ログインに失敗しました');
                    document.getElementById('loading').classList.remove('active');
                    e.target.style.display = 'block';
                }
            } catch (error) {
                showAlert('ログインに失敗しました。もう一度お試しください。');
                document.getElementById('loading').classList.remove('active');
                e.target.style.display = 'block';
            }
        });

        function showAlert(message) {
            const container = document.getElementById('alert-container');
            const alert = document.createElement('div');
            alert.className = 'alert alert-error';
            alert.textContent = message;
            container.innerHTML = '';
            container.appendChild(alert);
            setTimeout(() => { alert.style.opacity = '0'; setTimeout(() => alert.remove(), 300); }, 5000);
        }

        window.addEventListener('load', async () => {
            try {
                const response = await fetch('/api/meme', { credentials: 'include' });
                if (response.ok) {
                    const user = await response.json();
                    window.location.href = user.role === 'admin' ? '/admin' : '/staff';
                }
            } catch (error) { }
        });
    </script>
</body>

</html>
