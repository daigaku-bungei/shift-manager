<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>招待 - Urban Shift Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #ffffff;
      color: #0f1419;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .profile-card {
      background: #ffffff;
      border: 1px solid #eff3f4;
      border-radius: 16px;
      width: 100%;
      max-width: 400px;
      overflow: hidden;
      text-align: center;
    }

    .banner {
      height: 120px;
      background: linear-gradient(135deg, #1d9bf0, #1a8cd8);
      position: relative;
    }

    .shop-icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #ffffff;
      border: 4px solid #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      position: absolute;
      bottom: -40px;
      left: 50%;
      transform: translateX(-50%);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .card-body {
      padding: 50px 30px 30px;
    }

    .shop-name {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .shop-desc {
      color: #536471;
      font-size: 14px;
      margin-bottom: 24px;
      font-weight: 500;
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-bottom: 28px;
      padding: 16px 0;
      border-top: 1px solid #eff3f4;
      border-bottom: 1px solid #eff3f4;
    }

    .stat {
      text-align: center;
    }

    .stat-num {
      font-size: 24px;
      font-weight: 900;
      color: #0f1419;
    }

    .stat-label {
      font-size: 11px;
      color: #536471;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-join {
      display: block;
      background: #06C755;
      color: white;
      text-decoration: none;
      padding: 14px;
      border-radius: 9999px;
      font-weight: 700;
      font-size: 16px;
      margin: 0 30px 30px;
      transition: all 0.2s;
    }

    .btn-join:hover {
      background: #05b34c;
      color: white;
    }

    .btn-join:active {
      transform: scale(0.98);
    }

    ::selection {
      background: rgba(29, 155, 240, 0.15);
    }
  </style>
</head>

<body>
  <div class="profile-card">
    <div class="banner">
      <div class="shop-icon">🏪</div>
    </div>

    <div class="card-body">
      <h2 class="shop-name" id="shop-name">お店の名前</h2>
      <p class="shop-desc" id="shop-desc">シフト管理のお誘い</p>

      <div class="stats">
        <div class="stat">
          <div class="stat-num" id="staff-count">0</div>
          <div class="stat-label">スタッフ</div>
        </div>
        <div class="stat">
          <div class="stat-num" id="shift-count">0</div>
          <div class="stat-label">募集中</div>
        </div>
      </div>

      <a href="/api/line/login?invite=true" class="btn-join">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="white" style="vertical-align: middle; margin-right: 8px;">
          <path
            d="M19.365 9.863c.349 0 .63.285.63.631 0 .345-.281.63-.63.63H17.61v1.125h1.755c.349 0 .63.283.63.63 0 .344-.281.629-.63.629h-2.386c-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.63-.63h2.386c.349 0 .63.285.63.63 0 .349-.281.63-.63.63H17.61v1.125h1.755zm-3.855 3.016c0 .27-.174.51-.432.596-.064.021-.133.031-.199.031-.211 0-.391-.09-.51-.25l-2.443-3.317v2.94c0 .346-.282.631-.63.631-.345 0-.627-.285-.627-.631V8.108c0-.27.174-.51.432-.596.064-.021.138-.033.199-.033.201 0 .391.09.51.252l2.443 3.317V8.108c0-.345.282-.63.63-.63.344 0 .627.285.627.63v4.771zm-5.741 0c0 .346-.282.631-.631.631-.345 0-.627-.285-.627-.631V8.108c0-.345.282-.63.627-.63.349 0 .631.285.631.63v4.771zm-2.466.629H4.917c-.345 0-.63-.285-.63-.629V8.108c0-.345.285-.63.63-.63.348 0 .63.285.63.63v4.141h1.756c.348 0 .629.283.629.63 0 .344-.281.629-.629.629M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.078 9.436-6.975C23.176 14.393 24 12.458 24 10.314" />
        </svg>
        LINEで参加する
      </a>
    </div>
  </div>

  <script>
    fetch('/api/stats').then(r => r.json()).then(data => {
      document.getElementById('staff-count').textContent = data.staffCount || 0;
      document.getElementById('shift-count').textContent = data.activeShifts || 0;
    }).catch(() => { });
  </script>
</body>

</html>
