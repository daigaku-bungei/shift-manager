<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>招待 - Urban Shift Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0a0a12;
      --bg-secondary: #12121e;
      --bg-tertiary: #1a1a2e;
      --accent-primary: #8b5cf6;
      --accent-secondary: #06b6d4;
      --text-primary: #eeeef2;
      --text-secondary: #94a3b8;
      --border-glass: rgba(139, 92, 246, 0.12);
    }

    body {
      font-family: 'Inter', 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 30% 50%, rgba(139, 92, 246, 0.1) 0%, transparent 60%),
        radial-gradient(ellipse at 70% 30%, rgba(6, 182, 212, 0.06) 0%, transparent 50%);
      z-index: 0;
    }

    .profile-card {
      position: relative;
      z-index: 1;
      background: rgba(26, 26, 46, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border-glass);
      border-radius: 20px;
      width: 100%;
      max-width: 400px;
      overflow: hidden;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 60px rgba(139, 92, 246, 0.06);
      animation: cardIn 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.97);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .banner {
      height: 120px;
      background: linear-gradient(135deg, #7c3aed, #8b5cf6, #06b6d4);
      position: relative;
    }

    .shop-icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #8b5cf6, #06b6d4);
      border: 4px solid rgba(26, 26, 46, 0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      position: absolute;
      bottom: -40px;
      left: 50%;
      transform: translateX(-50%);
      box-shadow: 0 4px 20px rgba(139, 92, 246, 0.3);
    }

    .card-body {
      padding: 50px 30px 30px;
    }

    .shop-name {
      font-size: 24px;
      font-weight: 900;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .shop-desc {
      color: var(--text-secondary);
      font-size: 14px;
      margin-bottom: 24px;
      font-weight: 500;
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-bottom: 28px;
      padding: 16px 0;
      border-top: 1px solid var(--border-glass);
      border-bottom: 1px solid var(--border-glass);
    }

    .stat {
      text-align: center;
    }

    .stat-num {
      font-size: 24px;
      font-weight: 900;
      background: linear-gradient(135deg, #8b5cf6, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .stat-label {
      font-size: 11px;
      color: var(--text-secondary);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-join {
      display: block;
      background: #06C755;
      color: white;
      text-decoration: none;
      padding: 16px;
      border-radius: 12px;
      font-weight: 800;
      font-size: 16px;
      margin: 0 30px 30px;
      transition: all 0.3s;
      box-shadow: 0 4px 15px rgba(6, 199, 85, 0.25);
    }

    .btn-join:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(6, 199, 85, 0.35);
      color: white;
    }

    .btn-join:active {
      transform: scale(0.98);
    }

    ::selection {
      background: rgba(139, 92, 246, 0.3);
      color: white;
    }
  </style>
</head>

<body>
  <div class="profile-card">
    <div class="banner">
      <div class="shop-icon">🏪</div>
    </div>

    <div class="card-body">
      <h2 class="shop-name" id="shop-name">お店の名前</h2>
      <p class="shop-desc" id="shop-desc">シフト管理のお誘い</p>

      <div class="stats">
        <div class="stat">
          <div class="stat-num" id="staff-count">0</div>
          <div class="stat-label">スタッフ</div>
        </div>
        <div class="stat">
          <div class="stat-num" id="shift-count">0</div>
          <div class="stat-label">募集中</div>
        </div>
      </div>

      <a href="/api/line/login?invite=true" class="btn-join">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="white" style="vertical-align: middle; margin-right: 8px;">
          <path
            d="M19.365 9.863c.349 0 .63.285.63.631 0 .345-.281.63-.63.63H17.61v1.125h1.755c.349 0 .63.283.63.63 0 .344-.281.629-.63.629h-2.386c-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.63-.63h2.386c.349 0 .63.285.63.63 0 .349-.281.63-.63.63H17.61v1.125h1.755zm-3.855 3.016c0 .27-.174.51-.432.596-.064.021-.133.031-.199.031-.211 0-.391-.09-.51-.25l-2.443-3.317v2.94c0 .346-.282.631-.63.631-.345 0-.627-.285-.627-.631V8.108c0-.27.174-.51.432-.596.064-.021.138-.033.199-.033.201 0 .391.09.51.252l2.443 3.317V8.108c0-.345.282-.63.63-.63.344 0 .627.285.627.63v4.771zm-5.741 0c0 .346-.282.631-.631.631-.345 0-.627-.285-.627-.631V8.108c0-.345.282-.63.627-.63.349 0 .631.285.631.63v4.771zm-2.466.629H4.917c-.345 0-.63-.285-.63-.629V8.108c0-.345.285-.63.63-.63.348 0 .63.285.63.63v4.141h1.756c.348 0 .629.283.629.63 0 .344-.281.629-.629.629M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.078 9.436-6.975C23.176 14.393 24 12.458 24 10.314" />
        </svg>
        LINEで参加する
      </a>
    </div>
  </div>

  <script>
    // URLパラメータからショップ情報を取得
    const urlParams = new URLSearchParams(window.location.search);

    // ショップ名はURLに含めるか、APIから取得
    fetch('/api/stats').then(r => r.json()).then(data => {
      document.getElementById('staff-count').textContent = data.staffCount || 0;
      document.getElementById('shift-count').textContent = data.activeShifts || 0;
    }).catch(() => { });
  </script>
</body>

</html>
