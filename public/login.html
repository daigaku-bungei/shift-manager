<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Urban Shift Studio - ログイン</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: #0a0a12;
      position: relative;
      overflow: hidden;
    }

    /* ═══ Animated Background ═══ */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(139, 92, 246, 0.12) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(6, 182, 212, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(139, 92, 246, 0.06) 0%, transparent 50%);
      animation: bgPulse 12s ease-in-out infinite;
      background-size: 200% 200%;
      z-index: 0;
    }

    @keyframes bgPulse {

      0%,
      100% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }
    }

    /* ═══ Login Card ═══ */
    .login-card {
      position: relative;
      z-index: 1;
      background: rgba(26, 26, 46, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(139, 92, 246, 0.15);
      border-radius: 24px;
      width: 100%;
      max-width: 420px;
      padding: 44px 36px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 60px rgba(139, 92, 246, 0.08);
      animation: cardIn 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.97);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* ═══ Title ═══ */
    .login-title {
      font-size: 28px;
      font-weight: 900;
      text-align: center;
      margin-bottom: 4px;
      background: linear-gradient(135deg, #8b5cf6, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    .login-subtitle {
      text-align: center;
      color: #64748b;
      font-size: 13px;
      margin-bottom: 32px;
      font-weight: 500;
    }

    /* ═══ Tabs ═══ */
    .auth-tabs {
      display: flex;
      border-bottom: 2px solid rgba(139, 92, 246, 0.1);
      margin-bottom: 28px;
    }

    .auth-tab {
      flex: 1;
      text-align: center;
      padding: 11px 0;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      color: #64748b;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: all 0.3s;
      user-select: none;
    }

    .auth-tab:hover {
      color: #94a3b8;
    }

    .auth-tab.active {
      color: #a78bfa;
      border-bottom-color: #8b5cf6;
    }

    /* ═══ Role Toggle ═══ */
    .role-toggle {
      display: flex;
      gap: 6px;
      background: rgba(10, 10, 18, 0.5);
      padding: 5px;
      border-radius: 12px;
      margin-bottom: 24px;
      border: 1px solid rgba(139, 92, 246, 0.08);
    }

    .role-btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 9px;
      background: transparent;
      color: #64748b;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
      font-family: inherit;
    }

    .role-btn:hover {
      color: #94a3b8;
    }

    .role-btn.active {
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(6, 182, 212, 0.1));
      color: #a78bfa;
      box-shadow: 0 2px 10px rgba(139, 92, 246, 0.15);
    }

    /* ═══ Form ═══ */
    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #94a3b8;
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 0.3px;
    }

    .form-control {
      width: 100%;
      padding: 13px 15px;
      background: rgba(10, 10, 18, 0.5);
      border: 1.5px solid rgba(139, 92, 246, 0.12);
      color: #eeeef2;
      border-radius: 10px;
      font-size: 15px;
      transition: all 0.3s;
      font-family: inherit;
    }

    .form-control:focus {
      background: rgba(26, 26, 46, 0.8);
      border-color: #8b5cf6;
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.15), 0 0 20px rgba(139, 92, 246, 0.1);
      outline: none;
    }

    .form-control::placeholder {
      color: #4a5568;
    }

    /* ═══ Password ═══ */
    .password-wrapper {
      position: relative;
    }

    .password-wrapper .form-control {
      padding-right: 44px;
    }

    .toggle-pw {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 18px;
      user-select: none;
      color: #64748b;
      transition: color 0.2s;
    }

    .toggle-pw:hover {
      color: #a78bfa;
    }

    /* ═══ Buttons ═══ */
    .btn-primary {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #7c3aed, #8b5cf6);
      border: none;
      color: white;
      font-size: 15px;
      font-weight: 700;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 8px;
      font-family: inherit;
      box-shadow: 0 4px 15px rgba(139, 92, 246, 0.35);
      position: relative;
      overflow: hidden;
    }

    .btn-primary::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 40%, rgba(255, 255, 255, 0.1) 50%, transparent 60%);
      background-size: 200% 100%;
      animation: shimmer 3s ease infinite;
    }

    @keyframes shimmer {
      0% {
        background-position: 200% center;
      }

      100% {
        background-position: -200% center;
      }
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(139, 92, 246, 0.45);
    }

    .btn-primary:active {
      transform: scale(0.98);
    }

    /* ═══ LINE Button ═══ */
    .btn-line {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 13px;
      background: #06C755;
      border: none;
      color: white;
      font-size: 15px;
      font-weight: 700;
      border-radius: 10px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s;
      font-family: inherit;
      box-shadow: 0 4px 15px rgba(6, 199, 85, 0.25);
    }

    .btn-line:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(6, 199, 85, 0.35);
      color: white;
    }

    /* ═══ Divider ═══ */
    .divider {
      text-align: center;
      color: #4a5568;
      font-size: 12px;
      margin: 18px 0;
      position: relative;
      font-weight: 500;
    }

    .divider::before,
    .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(139, 92, 246, 0.15), transparent);
    }

    .divider::before {
      left: 0;
    }

    .divider::after {
      right: 0;
    }

    /* ═══ Hint Box ═══ */
    .hint-box {
      margin-top: 24px;
      background: rgba(10, 10, 18, 0.4);
      border: 1px solid rgba(139, 92, 246, 0.08);
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 12px;
      color: #64748b;
      text-align: center;
      line-height: 1.8;
    }

    .hint-box strong {
      color: #a78bfa;
      font-weight: 700;
    }

    /* ═══ Selection ═══ */
    ::selection {
      background: rgba(139, 92, 246, 0.3);
      color: white;
    }
  </style>
</head>

<body>

  <div class="login-card">
    <h1 class="login-title">Urban Shift Studio</h1>
    <p class="login-subtitle">リクエスト回答型シフト集約システム</p>

    <!-- タブ -->
    <div class="auth-tabs">
      <div class="auth-tab active" id="tab-login">ログイン</div>
      <div class="auth-tab" id="tab-register">新規登録</div>
    </div>

    <!-- ロール選択 -->
    <div class="role-toggle">
      <button type="button" class="role-btn active" data-role="admin">👑 管理者</button>
      <button type="button" class="role-btn" data-role="staff">🧑 スタッフ</button>
    </div>

    <!-- フォーム -->
    <form id="authForm" autocomplete="off">

      <!-- 新規登録のみ：お名前 -->
      <div class="form-group" id="name-group" style="display:none;">
        <label for="userName">お名前（店長に表示されます）</label>
        <input type="text" id="userName" class="form-control" placeholder="例：渋谷 太郎">
      </div>

      <!-- ログインのみ：ユーザーID -->
      <div class="form-group" id="userId-group">
        <label for="userId">ユーザーID</label>
        <input type="text" id="userId" class="form-control" placeholder="IDを入力">
      </div>

      <!-- パスワード（常時表示） -->
      <div class="form-group">
        <label for="password">パスワード</label>
        <div class="password-wrapper">
          <input type="password" id="password" class="form-control" placeholder="パスワードを入力" required>
          <span class="toggle-pw" id="toggle-pw" title="パスワードを表示">👁️</span>
        </div>
      </div>

      <button type="submit" id="submit-btn" class="btn-primary">ログイン</button>
    </form>

    <div class="divider">または</div>

    <!-- LINEログイン -->
    <a href="/api/line/login" class="btn-line">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
        <path
          d="M19.365 9.863c.349 0 .63.285.63.631 0 .345-.281.63-.63.63H17.61v1.125h1.755c.349 0 .63.283.63.63 0 .344-.281.629-.63.629h-2.386c-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.63-.63h2.386c.349 0 .63.285.63.63 0 .349-.281.63-.63.63H17.61v1.125h1.755zm-3.855 3.016c0 .27-.174.51-.432.596-.064.021-.133.031-.199.031-.211 0-.391-.09-.51-.25l-2.443-3.317v2.94c0 .346-.282.631-.63.631-.345 0-.627-.285-.627-.631V8.108c0-.27.174-.51.432-.596.064-.021.138-.033.199-.033.201 0 .391.09.51.252l2.443 3.317V8.108c0-.345.282-.63.63-.63.344 0 .627.285.627.63v4.771zm-5.741 0c0 .346-.282.631-.631.631-.345 0-.627-.285-.627-.631V8.108c0-.345.282-.63.627-.63.349 0 .631.285.631.63v4.771zm-2.466.629H4.917c-.345 0-.63-.285-.63-.629V8.108c0-.345.285-.63.63-.63.348 0 .63.285.63.63v4.141h1.756c.348 0 .629.283.629.63 0 .344-.281.629-.629.629M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.078 9.436-6.975C23.176 14.393 24 12.458 24 10.314" />
      </svg>
      LINEでログイン / 新規登録
    </a>

    <div class="hint-box">
      初期管理者: <strong>admin</strong> / <strong>admin123</strong><br>
      サンプルスタッフ: <strong>staff1</strong> または <strong>staff2</strong> / <strong>staff123</strong>
    </div>
  </div>

  <!-- login.jsのみ読み込む（auth.jsは不要） -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      let isRegisterMode = false;
      let currentRole = 'admin';

      // ── ロール切り替え ──
      const roleBtns = document.querySelectorAll('.role-btn');
      roleBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          roleBtns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentRole = btn.dataset.role;
        });
      });

      // ── タブ切り替え ──
      const tabLogin = document.getElementById('tab-login');
      const tabRegister = document.getElementById('tab-register');
      const nameGroup = document.getElementById('name-group');
      const userIdGroup = document.getElementById('userId-group');
      const userIdInput = document.getElementById('userId');
      const userNameInput = document.getElementById('userName');
      const submitBtn = document.getElementById('submit-btn');

      function switchToLogin() {
        isRegisterMode = false;
        tabLogin.classList.add('active');
        tabRegister.classList.remove('active');
        nameGroup.style.display = 'none';
        userIdGroup.style.display = 'block';
        userIdInput.required = true;
        userNameInput.required = false;
        submitBtn.textContent = 'ログイン';
      }

      function switchToRegister() {
        isRegisterMode = true;
        tabRegister.classList.add('active');
        tabLogin.classList.remove('active');
        nameGroup.style.display = 'block';
        userIdGroup.style.display = 'none';
        userIdInput.required = false;
        userNameInput.required = true;
        submitBtn.textContent = '新規登録してログイン';
      }

      tabLogin.addEventListener('click', switchToLogin);
      tabRegister.addEventListener('click', switchToRegister);

      // ── パスワード表示/非表示 ──
      const pwInput = document.getElementById('password');
      const togglePw = document.getElementById('toggle-pw');
      togglePw.addEventListener('click', () => {
        const isHidden = pwInput.type === 'password';
        pwInput.type = isHidden ? 'text' : 'password';
        togglePw.textContent = isHidden ? '🙈' : '👁️';
      });

      // ── フォーム送信 ──
      document.getElementById('authForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        submitBtn.disabled = true;
        submitBtn.textContent = '処理中...';

        const password = pwInput.value.trim();
        const name = userNameInput.value.trim();
        const userId = userIdInput.value.trim();

        try {
          if (isRegisterMode) {
            // 新規登録
            if (!name) { alert('お名前を入力してください'); return; }
            if (!password) { alert('パスワードを入力してください'); return; }
            const generatedUserId = 'user_' + Math.random().toString(36).substring(2, 8);
            const res = await fetch('/api/register', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ username: generatedUserId, password, name, role: currentRole })
            });
            const data = await res.json();
            if (res.ok || data.success) {
              alert(`🎉 アカウント作成成功！\n\nあなたのIDは「 ${generatedUserId} 」です。\n次回ログイン時に必要なのでメモしてください。`);
              window.location.href = currentRole === 'admin' ? '/admin/index.html' : '/staff/index.html';
            } else {
              alert(data.error || data.message || '登録に失敗しました');
            }
          } else {
            // ログイン
            if (!userId) { alert('ユーザーIDを入力してください'); return; }
            if (!password) { alert('パスワードを入力してください'); return; }
            const res = await fetch('/api/login', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ userId, password, role: currentRole })
            });
            const data = await res.json();
            if (res.ok || data.success) {
              window.location.href = currentRole === 'admin' ? '/admin/index.html' : '/staff/index.html';
            } else {
              alert(data.message || 'IDまたはパスワードが違います');
            }
          }
        } catch (err) {
          alert('通信エラーが発生しました');
        } finally {
          submitBtn.disabled = false;
          switchToLogin();
          submitBtn.textContent = isRegisterMode ? '新規登録してログイン' : 'ログイン';
        }
      });
    });
  </script>

</body>

</html>
