<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スタッフ画面 - Urban Shift Studio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f7f9fa;
            --bg-tertiary: #eff3f4;
            --bg-glass: rgba(255, 255, 255, 0.85);
            --border-glass: #eff3f4;
            --accent-primary: #1d9bf0;
            --accent-glow: rgba(29, 155, 240, 0.1);
            --accent-secondary: #1a8cd8;
            --text-primary: #0f1419;
            --text-secondary: #536471;
            --border-color: #eff3f4;
            --success: #00ba7c;
            --warning: #ffad1f;
            --danger: #f4212e;
        }

        body {
            font-family: 'Inter', 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-secondary);
            color: var(--text-primary);
            line-height: 1.5;
            font-size: 14px;
            padding-bottom: 80px;
            min-height: 100vh;
        }

        .header {
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-glass);
            padding: 10px 16px;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 18px;
            font-weight: 800;
            color: var(--text-primary);
        }

        .container {
            padding: 16px 14px;
            max-width: 960px;
            margin: 0 auto;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid var(--border-glass);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            width: 25%;
            transition: all 0.2s;
        }

        .nav-item.active {
            color: var(--accent-primary);
            transform: translateY(-2px);
        }

        .nav-icon {
            font-size: 22px;
            margin-bottom: 3px;
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card {
            background: var(--bg-primary);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            transition: background 0.2s;
        }

        .card:hover {
            background: #fafbfc;
        }

        .shift-card {
            border-left: 3px solid var(--accent-primary);
        }

        .shift-title {
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .shift-meta {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 9999px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--accent-primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-secondary);
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .stats-row {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-box {
            flex: 1;
            background: var(--bg-primary);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            padding: 18px;
            text-align: center;
            transition: background 0.2s;
        }

        .stat-box:hover {
            background: #fafbfc;
        }

        .stat-num {
            font-size: 32px;
            font-weight: 900;
            color: var(--text-primary);
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-secondary);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-primary);
            border: 1px solid var(--border-glass);
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.12);
            width: 100%;
            max-width: 480px;
            max-height: 85vh;
            border-radius: 16px;
            padding: 24px;
            overflow-y: auto;
            animation: popIn 0.25s ease;
        }

        @keyframes popIn {
            from {
                transform: scale(0.95);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .day-card {
            background: var(--bg-primary);
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 10px;
            transition: border-color 0.2s;
        }

        .day-card:focus-within {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .day-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-color);
        }

        .day-date {
            font-weight: 800;
            font-size: 14px;
        }

        .day-time-box {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .time-inputs {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 12px;
            padding: 10px 12px;
            background: var(--bg-secondary);
            border-radius: 8px;
            border: 1px dashed var(--border-color);
        }

        .time-input {
            padding: 8px 10px;
            border: 1px solid #cfd9de;
            border-radius: 8px;
            font-size: 14px;
            width: 120px;
            text-align: center;
            background: var(--bg-primary);
            font-family: monospace;
            font-weight: bold;
            color: var(--text-primary);
            transition: all 0.2s;
        }

        .time-input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 2px var(--accent-glow);
        }

        .time-input:disabled {
            background: var(--bg-tertiary);
            color: #8899a6;
            cursor: not-allowed;
            border-color: transparent;
        }

        .availability-buttons {
            display: flex;
            width: 100%;
            gap: 6px;
        }

        .avail-btn {
            flex: 1;
            padding: 8px 0;
            border: 1px solid #cfd9de;
            border-radius: 9999px;
            background: var(--bg-primary);
            font-size: 12px;
            font-weight: 700;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .avail-btn:hover:not(.selected-circle):not(.selected-triangle):not(.selected-cross) {
            background: var(--bg-tertiary);
        }

        .avail-btn.selected-circle {
            background: rgba(0, 186, 124, 0.08);
            color: #00ba7c;
            border-color: #00ba7c;
        }

        .avail-btn.selected-triangle {
            background: rgba(255, 173, 31, 0.08);
            color: #e2a003;
            border-color: #e2a003;
        }

        .avail-btn.selected-cross {
            background: var(--bg-tertiary);
            color: #8899a6;
            border-color: #8899a6;
        }

        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #cfd9de;
            border-radius: 8px;
            background: var(--bg-primary);
            font-family: inherit;
            font-size: 13px;
            color: var(--text-primary);
            transition: all 0.2s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .empty-state {
            text-align: center;
            padding: 40px 0;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 13px;
        }

        .shift-submit-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            min-height: 400px;
        }

        .shift-left-panel,
        .shift-right-panel {
            background: var(--bg-primary);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            padding: 14px;
        }

        .panel-title {
            font-size: 13px;
            font-weight: 800;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .date-list-item {
            padding: 9px 12px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            margin-bottom: 6px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            background: var(--bg-primary);
        }

        .date-list-item:hover {
            border-color: var(--accent-primary);
            background: rgba(29, 155, 240, 0.04);
            transform: translateX(3px);
        }

        .date-list-item.answered {
            border-color: var(--success);
            background: rgba(0, 186, 124, 0.04);
        }

        .date-list-item .date-text {
            font-weight: 700;
        }

        .date-list-item .date-time {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .date-list-item .date-status {
            font-size: 11px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 9999px;
        }

        .shift-calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 3px;
            text-align: center;
        }

        .shift-calendar .cal-header {
            font-size: 11px;
            font-weight: 800;
            padding: 4px 0;
            color: var(--text-secondary);
        }

        .shift-calendar .cal-header:first-child {
            color: var(--danger);
        }

        .shift-calendar .cal-header:last-child {
            color: var(--accent-primary);
        }

        .shift-calendar .cal-day {
            padding: 6px 0;
            border-radius: 9999px;
            font-size: 12px;
            font-weight: 600;
            cursor: default;
            transition: all 0.2s;
            color: var(--text-secondary);
        }

        .shift-calendar .cal-day.has-shift {
            background: rgba(29, 155, 240, 0.08);
            color: var(--accent-primary);
            font-weight: 800;
            cursor: pointer;
        }

        .shift-calendar .cal-day.has-shift:hover {
            background: rgba(29, 155, 240, 0.15);
            transform: scale(1.1);
        }

        .shift-calendar .cal-day.selected {
            background: var(--accent-primary);
            color: white;
        }

        .shift-calendar .cal-day.today {
            box-shadow: inset 0 0 0 2px var(--accent-primary);
        }

        .slot-card {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 10px 12px;
            margin-bottom: 6px;
        }

        .slot-card .slot-time {
            font-size: 13px;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--accent-primary);
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
            padding: 4px 0;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 4px;
            font-family: inherit;
        }

        .back-btn:hover {
            opacity: 0.7;
        }

        .shift-selector-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 12px;
            overflow-x: auto;
            padding-bottom: 4px;
        }

        .shift-tab {
            padding: 6px 14px;
            border-radius: 9999px;
            border: 1px solid #cfd9de;
            background: var(--bg-primary);
            cursor: pointer;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-secondary);
            white-space: nowrap;
            transition: all 0.2s;
            font-family: inherit;
        }

        .shift-tab.active {
            background: var(--accent-primary);
            color: white;
            border-color: transparent;
        }

        .shift-tab:hover:not(.active) {
            border-color: var(--accent-primary);
            color: var(--accent-primary);
        }

        @media (max-width: 768px) {
            .header {
                padding: 10px 15px;
            }

            .logo {
                font-size: 16px;
            }

            .user-badge {
                font-size: 11px;
                padding: 4px 8px;
            }

            .btn {
                font-size: 14px;
                padding: 12px;
            }

            .shift-submit-layout {
                grid-template-columns: 1fr;
            }

            .container {
                max-width: 560px;
            }
        }

        ::selection {
            background: rgba(29, 155, 240, 0.15);
        }

        ::-webkit-scrollbar {
            width: 0;
        }
    </style>
</head>

<body>

    <header class="header">
        <div class="logo">Urban Shift Studio</div>
        <div style="display: flex; align-items: center; gap: 10px;">
            <div class="user-badge" id="user-name-badge"
                onclick="document.querySelector('[data-section=\\\'mypage\\\']').click()"
                style="cursor: pointer; transition: opacity 0.2s;" onmouseover="this.style.opacity=0.7"
                onmouseout="this.style.opacity=1">ゲスト</div>
            <button onclick="logout()"
                style="padding: 6px 12px; background: var(--bg-tertiary); border: 1px solid var(--border-color); border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; color: var(--text-secondary); transition: 0.2s;"
                onmouseover="this.style.background='#e2e8f0'"
                onmouseout="this.style.background='var(--bg-tertiary)'">ログアウト</button>
        </div>
    </header>

    <div class="container">
        <section id="dashboard-section" class="section active">
            <h2 style="margin-bottom: 15px;">👋 お疲れ様です！</h2>
            <div class="stats-row">
                <div class="stat-box">
                    <div class="stat-num" id="stat-pending">0</div>
                    <div class="stat-label">未提出の募集</div>
                </div>
                <div class="stat-box">
                    <div class="stat-num" id="stat-confirmed" style="color: var(--success);">0</div>
                    <div class="stat-label">確定したシフト</div>
                </div>
            </div>
            <h3 style="margin-bottom: 15px;">📢 新着の募集</h3>
            <div id="dashboard-shift-list"></div>
        </section>

        <section id="shifts-section" class="section">
            <h2 style="margin-bottom: 12px; font-size: 18px;">📝 シフト提出</h2>
            <!-- シフト選択タブ -->
            <div id="shift-selector-tabs" class="shift-selector-tabs"></div>
            <!-- 2カラムレイアウト -->
            <div id="shift-submit-area"></div>
        </section>

        <section id="my-shifts-section" class="section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h2 style="margin: 0; font-size: 20px;">📅 マイカレンダー</h2>
                <button class="btn btn-primary"
                    style="padding: 8px 12px; font-size: 13px; width: auto; font-weight: bold; border-radius: 8px;"
                    onclick="openScheduleModal()">+ 予定を追加</button>
            </div>

            <div class="card" style="padding: 15px; margin-bottom: 20px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <button onclick="prevMyMonth()"
                        style="background: none; border: none; font-size: 18px; color: #1d9bf0; cursor: pointer; font-weight: bold;">◀</button>
                    <div id="my-calendar-month-year"
                        style="font-size: 18px; font-weight: 800; color: var(--text-primary);">2023年 10月</div>
                    <button onclick="nextMyMonth()"
                        style="background: none; border: none; font-size: 18px; color: #1d9bf0; cursor: pointer; font-weight: bold;">▶</button>
                </div>

                <div
                    style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; margin-bottom: 10px;">
                    <div style="font-size: 12px; font-weight: bold; color: var(--danger);">日</div>
                    <div style="font-size: 12px; font-weight: bold; color: var(--text-secondary);">月</div>
                    <div style="font-size: 12px; font-weight: bold; color: var(--text-secondary);">火</div>
                    <div style="font-size: 12px; font-weight: bold; color: var(--text-secondary);">水</div>
                    <div style="font-size: 12px; font-weight: bold; color: var(--text-secondary);">木</div>
                    <div style="font-size: 12px; font-weight: bold; color: var(--text-secondary);">金</div>
                    <div style="font-size: 12px; font-weight: bold; color: #1d9bf0;">土</div>
                </div>

                <div id="my-calendar-days" style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;">
                </div>
            </div>

            <!-- 選んだ日の詳細を表示する領域 -->
            <div id="my-day-details"
                style="display: none; padding: 15px; background: rgba(29, 155, 240, 0.04); border: 1px solid rgba(29, 155, 240, 0.15); border-radius: 16px; margin-bottom: 20px;">
                <h4 id="my-day-details-title" style="margin-bottom: 10px; font-size: 15px; color: #1d9bf0;"></h4>
                <div id="my-day-details-content"></div>
            </div>
        </section>
        <section id="mypage-section" class="section">
            <h2 style="margin-bottom: 20px; color: var(--text-primary);">👤 マイページ</h2>

            <div class="card" style="text-align: center; padding: 40px 20px;">
                <div style="font-size: 60px; margin-bottom: 15px;">🧑‍💻</div>
                <h3 id="mypage-name" style="font-size: 24px; margin-bottom: 5px; color: var(--text-primary);">名前</h3>

                <div
                    style="margin: 25px 0; padding: 20px; background: rgba(29, 155, 240, 0.04); border: 1px dashed rgba(29, 155, 240, 0.2); border-radius: 16px;">
                    <p style="color: var(--text-secondary); font-size: 13px; font-weight: bold; margin-bottom: 10px;">
                        店長に伝えるあなたのID</p>
                    <strong id="mypage-id" style="font-size: 28px; color: #1d9bf0; letter-spacing: 2px;">@id</strong>
                </div>

                <hr style="border: none; border-top: 1px dashed var(--border-color); margin: 30px 0;">

                <button onclick="logout()" class="btn"
                    style="background: rgba(244, 33, 46, 0.06); color: var(--danger); border: 1px solid rgba(244, 33, 46, 0.2); max-width: 250px; margin: 0 auto; box-shadow: none; border-radius: 9999px;">
                    🚪 ログアウト
                </button>
            </div>
        </section>
    </div>

    <!-- 旧モーダル削除済み - シフト提出は2カラムインラインUIに移行 -->

    <!-- 個人の予定追加モーダル -->
    <div id="schedule-modal" class="modal">
        <div class="modal-content" style="max-width: 400px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 style="font-size: 18px;">📝 プライベートな予定を追加</h3>
                <button onclick="closeScheduleModal()"
                    style="background:none; border:none; font-size: 24px; color: #999;">&times;</button>
            </div>

            <p style="font-size: 12px; color: var(--text-secondary); margin-bottom: 15px;">
                この予定は店長や他のスタッフには見えません。<br>自分だけの備忘録として使えます。</p>

            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 8px; font-size: 14px; font-weight: bold;">日付</label>
                <input type="date" id="schedule-date" class="time-input" style="width: 100%; border-radius: 8px;">
            </div>

            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; font-size: 14px; font-weight: bold;">予定の内容</label>
                <input type="text" id="schedule-title" class="time-input" style="width: 100%; border-radius: 8px;"
                    placeholder="例：大学の授業、飲み会...">
            </div>

            <button class="btn btn-primary" onclick="savePersonalSchedule()">保存する ✨</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <a class="nav-item active" data-section="dashboard">
            <div class="nav-icon">🏠</div><span>ホーム</span>
        </a>
        <a class="nav-item" data-section="shifts">
            <div class="nav-icon">📝</div><span>シフト提出</span>
        </a>
        <a class="nav-item" data-section="my-shifts">
            <div class="nav-icon">📅</div><span>確定シフト</span>
        </a>
        <a class="nav-item" data-section="mypage">
            <div class="nav-icon">👤</div><span>マイページ</span>
        </a>
    </nav>

    <script src="/staff/staff.js"></script>
</body>

</html>
